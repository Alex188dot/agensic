name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y zsh
          fi
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.10.0+cpu"
          python -m pip install -e ".[dev]"

      - name: Prepare zsh for CI
        shell: bash
        run: |
          touch "$HOME/.zshrc" "$HOME/.zprofile"
          export ZDOTDIR="$HOME"
          printenv ZDOTDIR || true
          zsh -lc 'echo zsh-ready'

      - name: Static Syntax Checks
        shell: bash
        run: |
          python -m py_compile cli.py engine.py privacy_guard.py server.py shell_client.py agensic/cli/app.py

      - name: Run Unit Tests
        shell: bash
        run: |
          python -m unittest discover -s tests/unit -v
