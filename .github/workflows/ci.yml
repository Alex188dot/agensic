name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "${{ runner.os }}" = "Linux" ]; then
            python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.10.0+cpu"
          fi
          python -m pip install -e ".[dev]"

      - name: Static Syntax Checks
        shell: bash
        run: |
          python -m py_compile cli.py engine.py privacy_guard.py server.py shell_client.py agensic/cli/app.py

      - name: Run Unit Tests
        shell: bash
        run: |
          python -m unittest discover -s tests/unit -v
