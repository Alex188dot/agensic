name: Release TUIs

on:
  push:
    tags:
      - "v*"

jobs:
  meta:
    name: Resolve Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "This workflow only publishes sidecars for semver release tags (vX.Y.Z)." >&2
            exit 1
          fi
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            build_cmd: cargo
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            build_cmd: cargo
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin-x64
            build_cmd: cargo
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
            build_cmd: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            build_cmd: cargo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          PLATFORM_KEY: ${{ matrix.platform }}
          BUILD_CMD: ${{ matrix.build_cmd }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          ./scripts/release_tuis.sh "$VERSION"

          mkdir -p ci-out
          cp "dist/tuis/${VERSION}/"*.tar.gz ci-out/
          cp "dist/tuis/${VERSION}/tuis_manifest.json" "ci-out/tuis_manifest.${PLATFORM_KEY}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: tuis-${{ matrix.platform }}
          path: ci-out/*

  assemble:
    name: Assemble Release Assets
    runs-on: ubuntu-latest
    needs: [meta, build]

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          path: downloaded
          pattern: tuis-*
          merge-multiple: true

      - name: Assemble Combined Manifest
        shell: bash
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          mkdir -p release-assets

          python - <<'PY'
          import glob
          import json
          import os
          import shutil
          import time

          platforms = {}
          for manifest_path in sorted(glob.glob("downloaded/tuis_manifest.*.json")):
              with open(manifest_path, "r", encoding="utf-8") as f:
                  payload = json.load(f)
              manifest_platforms = payload.get("platforms", {})
              if not isinstance(manifest_platforms, dict):
                  raise SystemExit(f"invalid manifest: {manifest_path}")
              for platform, entry in manifest_platforms.items():
                  platforms[platform] = entry

          for artifact_path in sorted(glob.glob("downloaded/*.tar.gz")):
              shutil.copyfile(artifact_path, os.path.join("release-assets", os.path.basename(artifact_path)))

          manifest = {
              "name": "agensic-tuis",
              "version": os.environ["VERSION"],
              "min_cli_version": "0.1.0",
              "generated_at": int(time.time()),
              "platforms": dict(sorted(platforms.items())),
          }
          with open("release-assets/tuis_manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=True, indent=2)
              f.write("\n")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: tuis-release-assets
          path: release-assets/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [meta, assemble]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tuis-release-assets
          path: release-assets

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          files: release-assets/*
          overwrite_files: true
