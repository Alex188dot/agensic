name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: cla-assistant/github-action@v2
        with:
          path-to-signatures: 'cla-signatures.json'
          path-to-document: 'CONTRIBUTING.md'
          branch: 'main'